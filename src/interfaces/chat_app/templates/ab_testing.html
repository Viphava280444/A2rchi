<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>archi - A/B Testing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='data.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/archi_notext.png') }}">
</head>
<body>
{% include '_alert_banner.html' %}
  <div class="data-app">
    <header class="data-header">
      <div class="header-left">
        <a href="/data" class="back-link" title="Back to Data">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"></path>
          </svg>
          <span>Data</span>
        </a>
      </div>
      <div class="header-center">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="header-icon">
          <path d="M12 3v18"></path>
          <path d="M3 12h18"></path>
          <circle cx="12" cy="12" r="9"></circle>
        </svg>
        <h1>A/B Testing</h1>
      </div>
      <div class="header-right">
        <a href="/chat" class="icon-btn ab-admin-nav-btn" title="Back to Chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span>Chat</span>
        </a>
      </div>
    </header>

    <main class="ab-admin-layout">
      <section class="ab-admin-panel">
        <div class="ab-admin-panel-header">
          <div>
            <h2>Experiment Settings</h2>
            <p>Manage participant sampling, disclosure behavior, and the active champion/challenger pool.</p>
          </div>
          <span class="ab-pool-status" id="ab-admin-status">Inactive</span>
        </div>

        <div class="ab-admin-settings-grid">
          <label class="ab-admin-field">
            <span>Sampling Rate</span>
            <input type="number" id="ab-admin-sample-rate" min="0" max="1" step="0.05" value="1">
          </label>
          <label class="ab-admin-field">
            <span>Disclosure Mode</span>
            <select id="ab-admin-disclosure-mode">
              <option value="post_vote_reveal">Reveal after vote</option>
              <option value="blind">Keep variants hidden</option>
              <option value="named">Show variants while streaming</option>
            </select>
          </label>
          <label class="ab-admin-field">
            <span>Agent Activity Default</span>
            <select id="ab-admin-trace-mode">
              <option value="minimal">Hidden</option>
              <option value="normal">Collapsed</option>
              <option value="verbose">Expanded</option>
            </select>
          </label>
          <label class="ab-admin-field">
            <span>Max Pending Per Conversation</span>
            <input type="number" id="ab-admin-max-pending" min="1" step="1" value="1">
          </label>
          <label class="ab-admin-field ab-admin-field-wide">
            <span>Champion</span>
            <select id="ab-admin-champion"></select>
          </label>
        </div>

        <div class="ab-admin-actions">
          <button class="ab-pool-btn ab-pool-btn-save" id="ab-admin-save">Save Configuration</button>
          <button class="ab-pool-btn ab-pool-btn-disable" id="ab-admin-disable">Disable</button>
        </div>
        <div class="ab-pool-message" id="ab-admin-message"></div>
      </section>

      <section class="ab-admin-panel">
        <div class="ab-admin-panel-header">
          <div>
            <h2>Variants</h2>
            <p>Each variant must have a unique label and a concrete agent markdown file in <code>agents_dir</code>.</p>
          </div>
          <button class="ab-admin-add-btn" id="ab-admin-add-variant" type="button">Add Variant</button>
        </div>
        <div class="ab-admin-variant-list" id="ab-admin-variant-list"></div>
      </section>
    </main>
  </div>

  <script src="{{ url_for('static', filename='modules/ab-admin.js') }}"></script>
</body>
</html>
